services:
  # El recolector de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=180d'  # Guarda 180 días de historia
      - '--storage.tsdb.retention.size=20GB'

    restart: unless-stopped
    networks:
      - shared_network

  # El visualizador gráfico (Acceso web en el puerto 3050)
  grafana:
    image: grafana/grafana:latest
    container_name: telemetry_grafana
    ports:
      - "3050:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 1: Métricas del Sistema Operativo Host (ThinkCentre)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: telemetry_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 2: Métricas individuales de cada contenedor Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2 # Versión estable para arquitecturas x86_64
    container_name: telemetry_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 3: Métricas de MySQL en Hostinger
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: telemetry_mysql_exporter
    volumes:
      - ./.my.cnf:/.my.cnf:ro
    command:
      - '--config.my-cnf=/.my.cnf'
    restart: unless-stopped
    networks:
      - shared_network

postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      # La cadena de conexión usa las mismas credenciales que le pusiste a tu contenedor de Timescale
      # El host es el nombre del contenedor de la base de datos
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@192.168.3.155:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - timescaledb
    restart: unless-stopped


volumes:
  prometheus_data:
  grafana_data:
  timescaledb_data:

networks:
  shared_network:
    external: true