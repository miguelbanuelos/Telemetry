services:
  # El recolector de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - shared_network

  # El visualizador gráfico (Acceso web en el puerto 3050)
  grafana:
    image: grafana/grafana:latest
    container_name: telemetry_grafana
    ports:
      - "3050:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 1: Métricas del Sistema Operativo Host (ThinkCentre)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: telemetry_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 2: Métricas individuales de cada contenedor Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2 # Versión estable para arquitecturas x86_64
    container_name: telemetry_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 3: Métricas de MySQL en Hostinger
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: telemetry_mysql_exporter
    environment:
      - DATA_SOURCE_NAME=${DB_USER}:${DB_PASSWORD}@(${DB_HOST}:${DB_PORT})/${DB_NAME}
    restart: unless-stopped
    networks:
      - shared_network

volumes:
  prometheus_data:
  grafana_data:

networks:
  shared_network:
    external: true