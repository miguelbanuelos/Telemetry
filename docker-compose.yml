services:
  # El recolector de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=180d'  # Guarda 180 días de historia
      - '--storage.tsdb.retention.size=20GB'

    restart: unless-stopped
    networks:
      - shared_network

  # El visualizador gráfico (Acceso web en el puerto 3050)
  grafana:
    image: grafana/grafana:latest
    container_name: telemetry_grafana
    ports:
      - "3050:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 1: Métricas del Sistema Operativo Host (ThinkCentre)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: telemetry_node_exporter
    ports:                 
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - shared_network

  
# Extractor 2: Métricas individuales de cada contenedor Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: telemetry_cadvisor
    privileged: true
    pid: "host"                                          
    ports:                  
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # CAMBIO 1: Mapeo específico compatible con cgroups v2 en Ubuntu
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      # CAMBIO 2: Añadimos la bandera para forzar el modo cgroups v2
      - '-docker_only=true'
      - '-disable_root_cgroup_stats=true' # Evita que todo se agrupe en id="/"
    devices:
      - /dev/kmsg:/dev/kmsg
    restart: unless-stopped
    networks:
      - shared_network

  # Extractor 3: Métricas de MySQL en Hostinger
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: telemetry_mysql_exporter
    ports:                 
      - "9104:9104"
    volumes:
      - ./.my.cnf:/.my.cnf:ro
    command:
      - '--config.my-cnf=/.my.cnf'
    restart: unless-stopped
    networks:
      - shared_network
# Extractor 4: Métricas de ProstgreSQL 
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      
      - DATA_SOURCE_NAME=postgresql://192.168.3.155:5432/${POSTGRES_DB}?sslmode=disable
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - shared_network


volumes:
  prometheus_data:
  grafana_data:
  timescaledb_data:

networks:
  shared_network:
    external: true